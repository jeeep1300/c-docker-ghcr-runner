name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/c-docker-ghcr-runner

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Show Docker version
        shell: powershell
        run: docker version

      - name: 3. Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build Docker image
        shell: powershell
        run: |
          # PowerShell 변수 인식 문제를 피하기 위해 ${{ }} 문법을 직접 사용함
          docker build -t "${{ env.IMAGE_NAME }}:latest" .

      - name: 5. Run container test
        shell: powershell
        run: |
          # 기존 테스트 컨테이너 강제 삭제 (에러 방지)
          docker rm -f c-test-container 2>$null
          # 빌드된 이미지 실행 및 결과 저장
          docker run --name c-test-container "${{ env.IMAGE_NAME }}:latest" > output.txt
          Get-Content output.txt
          # 결과값 검증 (C 코드의 printf 출력과 일치해야 함)
          Select-String -Path output.txt -Pattern "sum = 30"
          docker rm -f c-test-container

      - name: 6. Push image to GHCR
        shell: powershell
        run: |
          # 검증된 이미지를 레지스트리에 푸시
          docker push "${{ env.IMAGE_NAME }}:latest"

      - name: 7. Deploy with Docker Compose
        shell: powershell
        run: |
          # 배포 환경 갱신
          docker compose down
          docker compose pull
          docker compose up -d

      - name: 8. Verify running container
        shell: powershell
        run: docker ps